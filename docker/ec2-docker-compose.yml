version: '3.8'

services:
  postgres_db:
    image: ankane/pgvector:v0.5.1
    container_name: sribees_postgres_prod
    restart: always
    environment:
      POSTGRES_USER: sribees_user
      POSTGRES_PASSWORD: sribees_password_123
      POSTGRES_DB: sribeesonline
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sribees_user -d sribeesonline"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sribees_net

  redis_cache:
    image: redis:7-alpine
    container_name: sribees_redis_prod
    restart: always
    command: redis-server --appendonly yes --requirepass sribees_redis_password
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "sribees_redis_password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sribees_net

  fastapi_backend:
    image: __DOCKER_IMAGE__
    container_name: sribees_backend_prod
    restart: always
    env_file:
      - .env
    environment:
      APP_ENV: production
      DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://sribees_user:sribees_password_123@postgres_db:5432/sribeesonline
      REDIS_URL: redis://:sribees_redis_password@redis_cache:6379/0
      # Media: local disk provider. MEDIA_BASE_URL is what turns the stored
      # relative paths into absolute URLs, so it must be the public origin.
      # Override any of these in .env (e.g. STORAGE_BACKEND=s3 later).
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      MEDIA_ROOT: /app/media
      MEDIA_BASE_URL: ${MEDIA_BASE_URL:-https://api.sribees.com}
    volumes:
      # Uploads MUST outlive the container. Every deploy runs `docker compose
      # down` and recreates it from a fresh image, so without this named volume
      # every category and product image an admin uploaded is destroyed on the
      # next push. This line is the difference between a working local-disk
      # backend and one that silently loses data.
      - media_data:/app/media
    ports:
      - "8000:8000"
    depends_on:
      postgres_db:
        condition: service_healthy
      redis_cache:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - sribees_net

networks:
  sribees_net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  # Uploaded media (category tiles, product images, splash video).
  media_data:
    driver: local
