# =============================================================================
# SRIBEESonline — AWS EC2 Backend CI/CD Pipeline (Zero-Manual-Setup)
#
# Triggers on push to the 'main' branch of the standalone Backend repository.
#
# Required GitHub Secrets:
#   DOCKERHUB_USERNAME  — Your Docker Hub username
#   DOCKERHUB_TOKEN     — Your Docker Hub Personal Access Token (PAT)
#   EC2_HOST            — EC2 Public IP or Domain
#   EC2_USERNAME        — SSH username (e.g. ubuntu)
#   EC2_SSH_KEY         — SSH Private Key (PEM format)
#   ENV_CONTENT         — Full consolidated .env file contents
# =============================================================================

name: Build & Deploy Backend (Zero-Manual-Setup)

on:
  push:
    branches: [ main ]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/sribees-backend

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    outputs:
      compose_b64: ${{ steps.encode.outputs.compose_b64 }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Production Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Encode compose template as base64
        id: encode
        run: |
          # Base64 encode the EC2 compose template (avoids heredoc issues over SSH)
          COMPOSE_B64=$(base64 -w 0 docker/ec2-docker-compose.yml)
          echo "compose_b64=$COMPOSE_B64" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          COMPOSE_B64: ${{ needs.build-and-push.outputs.compose_b64 }}
          ENV_CONTENT: ${{ secrets.ENV_CONTENT }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/sribees-backend
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          envs: COMPOSE_B64,ENV_CONTENT,DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,DOCKER_IMAGE
          script_stop: true
          script: |
            set -euo pipefail

            echo "==== 1. UPDATE & INSTALL CORE DEPENDENCIES ===="
            sudo apt-get update -y
            sudo apt-get install -y curl git gnupg lsb-release certbot python3-certbot-nginx nginx

            echo "==== 2. INSTALL DOCKER (if missing) ===="
            if which docker >/dev/null 2>&1; then
              echo "Docker already installed."
            else
              echo "Installing Docker..."
              sudo mkdir -p /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
                | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg --yes
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
                https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" \
                | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
              sudo apt-get update -y
              sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker "$USER"
              echo "Docker installed!"
            fi

            if sudo docker compose version >/dev/null 2>&1; then
              echo "Docker compose already installed."
            else
              sudo apt-get install -y docker-compose-plugin
            fi

            echo "==== 3. CREATE DEPLOYMENT DIRECTORY ===="
            DEPLOY_DIR="$HOME/sribees-backend"
            sudo mkdir -p "$DEPLOY_DIR"
            sudo chown -R "$USER:$USER" "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"

            echo "==== 4. WRITE .env FILE ===="
            printf '%s' "$ENV_CONTENT" > .env
            chmod 600 .env

            # Extract domain and email safely (defaults if not found)
            DOMAIN=$(grep -m1 "^HOST_DOMAIN=" .env 2>/dev/null | cut -d'=' -f2- || true)
            DOMAIN="${DOMAIN:-api.sribeesonline.lk}"
            # Strip comments, spaces, protocol (http/https), and trailing slashes
            DOMAIN=$(echo "$DOMAIN" | cut -d'#' -f1 | sed -e 's|^[^/]*//||' -e 's|/.*$||' | tr -d '[:space:]')

            EMAIL=$(grep -m1 "^SSL_EMAIL=" .env 2>/dev/null | cut -d'=' -f2- || true)
            EMAIL="${EMAIL:-admin@sribeesonline.lk}"
            # Strip inline comments and spaces
            EMAIL=$(echo "$EMAIL" | cut -d'#' -f1 | tr -d '[:space:]')

            echo "Domain: $DOMAIN | Email: $EMAIL"

            echo "==== 5. WRITE docker-compose.yml (from base64 template) ===="
            echo "$COMPOSE_B64" | base64 -d > docker-compose.yml
            sed -i "s|__DOCKER_IMAGE__|${DOCKER_IMAGE}:latest|g" docker-compose.yml
            echo "docker-compose.yml written. Validating..."
            sudo docker compose config --quiet && echo "YAML valid!" || { echo "YAML invalid!"; cat docker-compose.yml; exit 1; }

            echo "==== 6. LOGIN & PULL DOCKER IMAGES ===="
            echo "$DOCKERHUB_TOKEN" | sudo docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            sudo docker compose pull fastapi_backend

            echo "==== 7. DEPLOY SERVICES ===="
            sudo docker compose down --remove-orphans 2>/dev/null || true
            sudo docker compose up -d postgres_db redis_cache

            # Resolve DB credentials from .env, falling back to the compose defaults.
            DB_USER=$(grep -m1 '^POSTGRES_USER=' .env 2>/dev/null | cut -d '=' -f2- | cut -d '#' -f1 | tr -d '[:space:]')
            DB_USER="${DB_USER:-sribees_user}"
            DB_NAME=$(grep -m1 '^POSTGRES_DB=' .env 2>/dev/null | cut -d '=' -f2- | cut -d '#' -f1 | tr -d '[:space:]')
            DB_NAME="${DB_NAME:-sribeesonline}"

            echo "Waiting for Postgres ($DB_USER/$DB_NAME) to accept connections..."
            DB_READY=0
            for i in $(seq 1 30); do
              if sudo docker compose exec -T postgres_db pg_isready -U "$DB_USER" -d "$DB_NAME" >/dev/null 2>&1; then
                DB_READY=1
                echo "Postgres is ready."
                break
              fi
              echo "  ...waiting for Postgres ($i/30)"
              sleep 2
            done
            if [ "$DB_READY" -ne 1 ]; then
              echo "ERROR: Postgres is unreachable after 60s — aborting deploy."
              sudo docker compose logs --tail 50 postgres_db || true
              exit 1
            fi

            # Start the app first: on boot it runs SQLAlchemy create_all(), which
            # creates any MISSING TABLES. The raw SQL migrations below then ALTER
            # those tables to add new COLUMNS/constraints, so the tables must
            # already exist before migrations run.
            echo "Starting application (creates base tables on first boot)..."
            sudo docker compose up -d fastapi_backend

            echo "Waiting for the application to report healthy..."
            APP_READY=0
            for i in $(seq 1 40); do
              if curl -sf http://127.0.0.1:8000/health >/dev/null 2>&1; then
                APP_READY=1
                echo "Application is healthy."
                break
              fi
              echo "  ...waiting for app ($i/40)"
              sleep 3
            done
            if [ "$APP_READY" -ne 1 ]; then
              echo "WARNING: app did not report healthy in time; running migrations anyway."
              sudo docker compose logs --tail 50 fastapi_backend || true
            fi

            echo "==== 7b. RUN SQL MIGRATIONS (idempotent, in filename order) ===="
            # The migration .sql files ship inside the backend image at
            # /app/migrations. Copy them out of the running container so we can
            # feed each into psql. Files use IF NOT EXISTS, so re-running every
            # deploy is safe.
            rm -rf ./migrations
            sudo docker compose cp fastapi_backend:/app/migrations ./migrations
            sudo chown -R "$USER":"$USER" ./migrations 2>/dev/null || true

            if ls ./migrations/*.sql >/dev/null 2>&1; then
              for f in $(ls -1 ./migrations/*.sql | sort); do
                echo ">>> Applying migration: $(basename "$f")"
                # ON_ERROR_STOP=1 makes psql exit non-zero on a genuine SQL error
                # or an unreachable DB (which aborts the deploy), while harmless
                # NOTICEs from IF NOT EXISTS clauses do NOT stop execution.
                if cat "$f" | sudo docker compose exec -T postgres_db \
                     psql -v ON_ERROR_STOP=1 -U "$DB_USER" -d "$DB_NAME"; then
                  echo "    OK: $(basename "$f")"
                else
                  echo "    FAILED: $(basename "$f") — aborting deploy."
                  exit 1
                fi
              done
              echo "All SQL migrations applied successfully."
            else
              echo "No .sql migration files found in the image — skipping migrations."
            fi

            echo "==== 8. NGINX REVERSE PROXY & SSL ===="
            NGINX_CONF="/etc/nginx/sites-available/sribees"

            echo "server {" | sudo tee "$NGINX_CONF" > /dev/null
            echo "    listen 80;" | sudo tee -a "$NGINX_CONF" > /dev/null
            echo "    server_name ${DOMAIN};" | sudo tee -a "$NGINX_CONF" > /dev/null
            echo "" | sudo tee -a "$NGINX_CONF" > /dev/null
            echo "    location / {" | sudo tee -a "$NGINX_CONF" > /dev/null
            echo "        proxy_pass http://127.0.0.1:8000;" | sudo tee -a "$NGINX_CONF" > /dev/null
            echo '        proxy_set_header Host $host;' | sudo tee -a "$NGINX_CONF" > /dev/null
            echo '        proxy_set_header X-Real-IP $remote_addr;' | sudo tee -a "$NGINX_CONF" > /dev/null
            echo '        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;' | sudo tee -a "$NGINX_CONF" > /dev/null
            echo '        proxy_set_header X-Forwarded-Proto $scheme;' | sudo tee -a "$NGINX_CONF" > /dev/null
            echo "        proxy_http_version 1.1;" | sudo tee -a "$NGINX_CONF" > /dev/null
            echo '        proxy_set_header Upgrade $http_upgrade;' | sudo tee -a "$NGINX_CONF" > /dev/null
            echo '        proxy_set_header Connection "upgrade";' | sudo tee -a "$NGINX_CONF" > /dev/null
            echo "        proxy_read_timeout 86400;" | sudo tee -a "$NGINX_CONF" > /dev/null
            echo "    }" | sudo tee -a "$NGINX_CONF" > /dev/null
            echo "}" | sudo tee -a "$NGINX_CONF" > /dev/null

            sudo ln -sf "$NGINX_CONF" /etc/nginx/sites-enabled/
            sudo rm -f /etc/nginx/sites-enabled/default 2>/dev/null || true
            sudo nginx -t

            echo "Requesting SSL for $DOMAIN..."
            sudo certbot --nginx -d "$DOMAIN" \
              --non-interactive --agree-tos -m "$EMAIL" \
              --redirect --keep-until-expiring 2>/dev/null || echo "SSL setup skipped (DNS may not be ready)"

            sudo systemctl restart nginx

            echo "==== 9. SSL AUTO-RENEWAL CRON ===="
            EXISTING_CRON=$(sudo crontab -l 2>/dev/null || true)
            if echo "$EXISTING_CRON" | grep -q "certbot renew"; then
              echo "SSL auto-renewal cron already exists."
            else
              (echo "$EXISTING_CRON"; echo "0 0 * * * certbot renew --post-hook 'systemctl reload nginx'") | sudo crontab -
              echo "SSL auto-renewal cron added!"
            fi

            echo ""
            echo "==== DEPLOYMENT COMPLETED SUCCESSFULLY ===="
            sudo docker compose ps
            echo ""
            echo "API: https://${DOMAIN}/health"
            echo "Docs: https://${DOMAIN}/docs"
